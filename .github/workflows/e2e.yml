name: E2E

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WP_BASE_URL: http://localhost:8080/
  WP_PATH: /tmp/wordpress
  WP_ADMIN_USER: admin
  WP_ADMIN_PASS: password

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, pdo_mysql

      - name: Install WP-CLI
        run: |
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Install WordPress
        run: |
          mkdir -p /tmp/wordpress
          wp core download --path=/tmp/wordpress
          wp config create --path=/tmp/wordpress \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1
          wp core install --path=/tmp/wordpress \
            --url=http://localhost:8080 \
            --title="Test Store" \
            --admin_user=admin \
            --admin_password=password \
            --admin_email=test@example.com \
            --skip-email
          wp rewrite structure '/%postname%/' --hard --path=/tmp/wordpress
          wp rewrite flush --hard --path=/tmp/wordpress

      - name: Install & configure WooCommerce
        run: |
          wp plugin install woocommerce --activate --path=/tmp/wordpress
          wp eval 'update_option("woocommerce_currency", "KRW");
            update_option("woocommerce_default_country", "KR");
            update_option("woocommerce_onboarding_profile", ["completed"=>true]);' \
            --path=/tmp/wordpress
          # COD를 WC CLI로 활성화 (option 직접 업데이트보다 안정적)
          wp wc payment_gateway update cod \
            --enabled=true --user=1 --path=/tmp/wordpress
          # WC 10.x는 블록 체크아웃이 기본값 — 클래식 shortcode로 교체
          CHECKOUT_ID=$(wp option get woocommerce_checkout_page_id --path=/tmp/wordpress)
          wp post update $CHECKOUT_ID \
            --post_content="[woocommerce_checkout]" --path=/tmp/wordpress

      - name: Install plugin
        run: |
          mkdir -p /tmp/wordpress/wp-content/plugins/wc-order-redirect/includes
          cp wc-order-redirect.php uninstall.php \
            /tmp/wordpress/wp-content/plugins/wc-order-redirect/
          cp includes/*.php \
            /tmp/wordpress/wp-content/plugins/wc-order-redirect/includes/
          wp plugin activate wc-order-redirect --path=/tmp/wordpress

      - name: Start WordPress server
        run: |
          wp server --host=localhost --port=8080 --path=/tmp/wordpress &
          timeout 20 bash -c \
            'until curl -sf http://localhost:8080/wp-login.php; do sleep 1; done'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
