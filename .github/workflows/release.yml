name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Build release ZIP
        run: |
          mkdir -p dist/wc-order-redirect/includes
          cp wc-order-redirect.php uninstall.php dist/wc-order-redirect/
          cp includes/*.php dist/wc-order-redirect/includes/
          cp -r vendor dist/wc-order-redirect/
          cd dist && zip -r ../wc-order-redirect.zip wc-order-redirect/

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            wc-order-redirect.zip \
            --title "WC Order Redirect ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
