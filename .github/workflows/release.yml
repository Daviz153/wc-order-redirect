name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.1.1)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Build release ZIP
        run: |
          mkdir -p dist/wc-order-redirect/includes
          cp wc-order-redirect.php uninstall.php dist/wc-order-redirect/
          cp includes/*.php dist/wc-order-redirect/includes/
          cp -r assets dist/wc-order-redirect/
          cp -r vendor dist/wc-order-redirect/
          cd dist && zip -r ../wc-order-redirect.zip wc-order-redirect/

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release upload "$RELEASE_TAG" wc-order-redirect.zip --clobber
